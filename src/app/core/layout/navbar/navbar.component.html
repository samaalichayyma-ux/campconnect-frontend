<header class="cc-navbar">
  <div class="cc-mainbar">
    <a routerLink="/public" class="cc-logo">
      <img src="assets/images/logotranssansslo.png" alt="CampConnect" />
    </a>

    <nav class="cc-menu">
      <a routerLink="/public" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/public/camping-sites" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Destinations</a>
      <a href="#">Shop</a>
      <a href="/public/repas">Restaurant</a>
      <a href="#">Events</a>
      <a href="#">Formations</a>
    </nav>

    <div class="cc-actions">
      <a href="#" class="cc-cart-btn" aria-label="Cart">🛒</a>

      <ng-container *ngIf="!authService.isLoggedIn(); else loggedInBlock">
        <a routerLink="/login" class="cc-login-btn">Login</a>
      </ng-container>


<ng-template #loggedInBlock>
  <div class="cc-user-box">
    <div class="cc-avatar"
         routerLink="/public/profile"
         [ngStyle]="{ background: getAvatarColor() }">
      {{ getUserInitial() }}
    </div>
    <a *ngIf="userRole === 'ADMINISTRATEUR'"
      routerLink="/admin"
      class="cc-role-btn">
      Admin
    </a>
    <a *ngIf="userRole === 'GUIDE'"
      routerLink="/admin"
      class="cc-role-btn">
      Camp Host
    </a>

    <button type="button" class="cc-logout-btn" (click)="logout()">
      Logout
    </button>
  </div>

</ng-template>
    </div>
  </div>
</header>
