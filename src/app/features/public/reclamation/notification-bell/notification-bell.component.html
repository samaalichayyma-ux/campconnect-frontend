<div class="nb-wrapper">

  <!-- ── Bouton cloche ── -->
  <button class="nb-btn" (click)="togglePanel()" aria-label="Notifications réclamation">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
         fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0
           00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0
           .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
    </svg>
    <!-- Badge rouge -->
    <span class="nb-badge" *ngIf="unreadCount > 0">
      {{ unreadCount > 9 ? '9+' : unreadCount }}
    </span>
  </button>

  <!-- ── Panneau dropdown ── -->
  <div class="nb-panel" *ngIf="isPanelOpen" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="nb-panel-header">
      <span class="nb-panel-title">
        🔔 Notifications
        <span class="nb-chip" *ngIf="unreadCount > 0">{{ unreadCount }} new</span>
      </span>
      <button class="nb-mark-all" *ngIf="unreadCount > 0" (click)="markAllRead()">
        Mark all read
      </button>
    </div>

    <!-- Loading -->
    <div class="nb-loading" *ngIf="isLoading">
      <div class="nb-spinner"></div>
      <span>Loading…</span>
    </div>

    <!-- Liste vide -->
    <div class="nb-empty" *ngIf="!isLoading && notifications.length === 0">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36"
           fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.3">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0
             00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0
             .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
      <p>No notifications yet</p>
    </div>

    <!-- Liste notifications -->
    <div class="nb-list" *ngIf="!isLoading && notifications.length > 0">
      <button
        class="nb-item"
        *ngFor="let n of notifications"
        [class.nb-unread]="!n.read"
        (click)="openNotification(n)">

        <span class="nb-dot" *ngIf="!n.read"></span>

        <div class="nb-item-body">
          <p class="nb-message">{{ n.message }}</p>
          <div class="nb-meta">
            <span class="nb-statut" [ngClass]="getStatutClass(n.newStatut)">
              {{ getStatutLabel(n.newStatut) }}
            </span>
            <span class="nb-date">{{ n.dateCreation | date:'d MMM, HH:mm' }}</span>
          </div>
        </div>

        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"
             class="nb-arrow">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>

      </button>
    </div>

    <!-- Footer -->
    <div class="nb-footer" *ngIf="!isLoading && notifications.length > 0">
      <a routerLink="/public/reclamations" (click)="isPanelOpen = false">
        View all my complaints →
      </a>
    </div>

  </div>
</div>
