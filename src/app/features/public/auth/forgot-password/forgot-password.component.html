<section class="auth-page">
  <div class="auth-overlay"></div>

  <div class="auth-card">
    <div class="auth-badge">CampConnect</div>

    <div class="auth-icon">
      <span>🔐</span>
    </div>

    <h1>Forgot Password</h1>
    <p class="subtitle">
      Enter your email address to receive a secure reset link.
    </p>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        [(ngModel)]="email"
        placeholder="Enter your email"
        [class.input-error]="emailTouched && !isValidEmail()"
        (blur)="emailTouched = true"
      />
      <small *ngIf="emailTouched && !isValidEmail()" class="error-text">
        Please enter a valid email address
      </small>
    </div>

    <button class="btn primary-btn" (click)="submit()" [disabled]="loading">
      {{ loading ? 'Sending...' : 'Send reset link' }}
    </button>

    <div *ngIf="successMessage" class="message-box success-message">
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="message-box error-message">
      {{ errorMessage }}
    </div>

    <a routerLink="/login" class="back-link">
      Back to Login
    </a>

    <a routerLink="/public" class="back-home-btn">
      Back to Home
    </a>
  </div>
</section>
