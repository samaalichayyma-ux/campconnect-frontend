<section class="auth-page">
  <div class="auth-overlay"></div>

  <div class="auth-card">
    <div class="auth-badge">CampConnect</div>

    <div class="auth-icon">
      <span>🔑</span>
    </div>

    <h1>Reset Password</h1>
    <p class="subtitle">Create a new secure password for your account.</p>

    <div class="form-group">
      <label for="newPassword">New Password</label>

      <div class="password-wrapper">
        <input
          id="newPassword"
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="newPassword"
          placeholder="Enter your new password"
          [class.input-error]="passwordTouched && !isValidPassword()"
          (blur)="passwordTouched = true"
        />

        <button
          type="button"
          class="password-toggle"
          (click)="togglePassword()"
        >
          {{ showPassword ? 'Hide' : 'Show' }}
        </button>
      </div>

      <small *ngIf="passwordTouched && !isValidPassword()" class="error-text">
        Password must contain at least 6 characters
      </small>
    </div>

    <button class="btn primary-btn" (click)="submit()" [disabled]="loading">
      {{ loading ? 'Saving...' : 'Reset Password' }}
    </button>

    <div *ngIf="successMessage" class="message-box success-message">
      {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="message-box error-message">
      {{ errorMessage }}
    </div>

    <a routerLink="/login" class="back-link">
      Back to Login
    </a>

    <a routerLink="/public" class="back-home-btn">
      Back to Home
    </a>
  </div>
</section>
