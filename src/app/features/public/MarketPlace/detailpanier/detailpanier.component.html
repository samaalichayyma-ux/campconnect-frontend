<section class="cart-page">
  <div class="cart-container">
    <div class="cart-wrapper">
      <h2 class="cart-title">My Cart</h2>

      <p class="cart-error" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="cart-loading" *ngIf="loading">Loading cart...</p>

      <div *ngIf="!loading && detailsPanier.length === 0" class="empty-cart">
        <p>Your cart is empty.</p>
        <button class="secondary-btn" (click)="continuerShopping()">
          Continue Shopping
        </button>
      </div>

      <div *ngIf="!loading && detailsPanier.length > 0">
        <div class="cart-table-wrapper">
          <table class="cart-table">
            <thead>
              <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
              </tr>
            </thead>

            <tbody>
              <tr *ngFor="let detail of detailsPanier">
                <td class="product-cell">
                  <button
                    class="remove-btn"
                   (click)="supprimerArticle(getDetailId(detail)!)"
                    title="Remove"
                  >
                    ✕
                  </button>

                  <img
                    [src]="getImage(detail)"
                    [alt]="getNomComplet(detail)"
                    class="product-image"
                  />

                  <div class="product-info">
                    <h3>{{ getNomComplet(detail) }}</h3>
                  </div>
                </td>

                <td>{{ getPrix(detail) }} TND</td>

                <td>
                  <div class="qty-box">
                    <button class="qty-btn" (click)="diminuerQuantite(detail)">-</button>
                    <input
                      class="qty-input"
                      type="text"
                      [value]="detail.quantite"
                      readonly
                    />
                    <button class="qty-btn" (click)="augmenterQuantite(detail)">+</button>
                  </div>
                </td>

                <td class="subtotal">{{ getSubtotal(detail) }} TND</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="cart-actions">
          <button class="link-btn" (click)="continuerShopping()">
            ← Continue Shopping
          </button>

          <button class="secondary-btn" (click)="viderPanier()">
            Empty Cart
          </button>
        </div>

        <div class="cart-summary">
          <div class="summary-card">
            <h3>Cart Totals</h3>

            <div class="summary-row">
              <span>Subtotal</span>
              <span>{{ getTotal() }} TND</span>
            </div>

            <div class="summary-row total">
              <span>Total</span>
              <span>{{ getTotal() }} TND</span>
            </div>

            <button class="primary-btn" (click)="passerCommande()">
              Proceed to Checkout
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
