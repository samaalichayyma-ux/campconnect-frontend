<div class="avis-list">
  <div class="avis-card" *ngFor="let avis of avisList">
    <div class="avis-header">
      <div class="avis-user">
        <div
          class="avatar avatar-fallback"
          [ngStyle]="{ background: getAvatarColor(avis) }"
        >
          {{ getUserInitial(avis) }}
        </div>

        <div class="user-details">
          <span class="user-name">{{ getDisplayName(avis) }}</span>
          <span class="date">{{ avis.dateCreation | date:'mediumDate' }}</span>
        </div>
      </div>

      <button
      *ngIf="isOwner(avis)"
        class="btn-edit-icon"
        (click)="openEditPopup(avis)"
        title="Update review"
      >
        ✏️
      </button>
    </div>

    <div class="stars" *ngIf="avis.note !== null">
      <span
        *ngFor="let star of [1,2,3,4,5]"
        [class.filled]="star <= (avis.note ?? 0)"
        [class.empty]="star > (avis.note ?? 0)"
      >
        ★
      </span>
    </div>

    <p class="comment" *ngIf="avis.commentaire">
      {{ avis.commentaire }}
    </p>
  </div>
</div>
