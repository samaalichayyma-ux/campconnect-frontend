<section class="form-page">
  <div class="form-card">
    <h1>Create User</h1>

    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

    <div class="form-group">
      <label>Nom</label>
      <input type="text" [(ngModel)]="user.nom" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="user.email" />
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="user.motDePasse" />
    </div>

    <div class="form-group">
      <label>Téléphone</label>
      <input type="text" [(ngModel)]="user.telephone" />
    </div>

    <div class="form-group">
  <label for="role">Role</label>
  <select id="role" [(ngModel)]="user.role" name="role">
    <option value="" disabled>Select user role</option>
    <option value="CLIENT">Client</option>
    <option value="LIVREUR">Livreur</option>
    <option value="GERANT_RESTAU">Gerant_Restau</option>
    <option value="GUIDE">Guide</option>
    <option value="AGENT_ASSURANCE">Agent_Assurance</option>
  </select>
</div>

    <div class="form-group">
      <label>Adresse</label>
      <input type="text" [(ngModel)]="user.profil!.adresse" />
    </div>

    <div class="form-group">
      <label>Photo URL</label>
      <input type="text" [(ngModel)]="user.profil!.photo" />
    </div>

    <div class="form-group">
      <label>Biographie</label>
      <textarea rows="4" [(ngModel)]="user.profil!.biographie"></textarea>
    </div>

    <div class="actions">
      <a routerLink="/admin/users" class="btn back">Cancel</a>
      <button class="btn save" (click)="save()" [disabled]="loading">
        {{ loading ? 'Saving...' : 'Create' }}
      </button>
    </div>
  </div>
</section>
