<section class="form-page">
  <div class="form-card">
    <h1>Edit User</h1>

    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

    <div class="form-group">
      <label>Nom</label>
      <input type="text" [(ngModel)]="user.nom" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="user.email" />
    </div>

    <div class="form-group">
      <label>Téléphone</label>
      <input type="text" [(ngModel)]="user.telephone" />
    </div>

    <div class="form-group">
      <label>Rôle</label>
      <select [(ngModel)]="user.role">
        <option value="CLIENT">CLIENT</option>
        <option value="GUIDE">GUIDE</option>
        <option value="ADMINISTRATEUR">ADMINISTRATEUR</option>
      </select>
    </div>

    <div class="form-group">
      <label>Adresse</label>
      <input type="text" [(ngModel)]="user.profil!.adresse" />
    </div>

    <div class="form-group">
      <label>Photo URL</label>
      <input type="text" [(ngModel)]="user.profil!.photo" />
    </div>

    <div class="form-group">
      <label>Biographie</label>
      <textarea rows="4" [(ngModel)]="user.profil!.biographie"></textarea>
    </div>

    <div class="actions">
      <a routerLink="/admin/users" class="btn back">Cancel</a>
      <button class="btn save" (click)="update()" [disabled]="loading">
        {{ loading ? 'Updating...' : 'Update' }}
      </button>
    </div>
  </div>
</section>
