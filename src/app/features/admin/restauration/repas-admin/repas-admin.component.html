<section class="dashboard-page">
  <div class="header">
    <h1>Meal Management</h1>
    <button class="add-btn" (click)="openForm()">+ Add Meal</button>
  </div>

  <input [(ngModel)]="searchText" placeholder="Search meals..." class="search-input" />

  <div *ngIf="showForm" class="form-card">
    <h3>{{ isEdit ? 'Edit' : 'Add' }} Meal</h3>
    <input [(ngModel)]="form.nom" placeholder="Name" />
    <input [(ngModel)]="form.prix" type="number" placeholder="Price" />
    <div class="form-actions">
      <button class="btn save" (click)="save()">Save</button>
      <button class="btn cancel" (click)="cancel()">Cancel</button>
    </div>
  </div>

  <div class="table-wrapper" *ngIf="repasList.length > 0">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Price</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of filteredRepas">
          <td>{{ r.id }}</td>
          <td>{{ r.nom }}</td>
          <td>{{ r.prix | currency }}</td>
          <td class="actions">
            <button class="btn edit" (click)="edit(r)">Edit</button>
            <button class="btn delete" (click)="delete(r.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <h2>Orders</h2>
  <div class="table-wrapper" *ngIf="commandesList.length > 0">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>Total Amount</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of commandesList">
          <td>{{ c.id }}</td>
          <td>{{ c.dateCommande | date:'short' }}</td>
          <td>{{ c.montantTotal | currency }}</td>
          <td>{{ c.statut }}</td>
          <td class="actions">
            <button class="btn toggle" *ngIf="c.statut !== 'Completed'" (click)="updateCommandeStatus(c, 'Completed')">Mark Completed</button>
            <button class="btn toggle" *ngIf="c.statut === 'Completed'" (click)="updateCommandeStatus(c, 'Pending')">Mark Pending</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
