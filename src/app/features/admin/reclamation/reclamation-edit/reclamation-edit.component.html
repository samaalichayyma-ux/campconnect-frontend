<div class="edit-page">

  <!-- Loading -->
  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <p>Loading complaint...</p>
  </div>

  <!-- Error -->
  <div *ngIf="errorMessage && !loading" class="error-state">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    {{ errorMessage }}
  </div>

  <!-- Edit Card -->
  <div *ngIf="reclamation && !loading" class="edit-card">

    <!-- Card Header -->
    <div class="card-header">
      <div class="header-left">
        <div class="header-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
        </div>
        <div>
          <h2 class="card-title">Edit Complaint #{{ reclamation.id }}</h2>
          <p class="card-subtitle">Modify the description or status of this complaint</p>
        </div>
      </div>
    </div>

    <!-- Card Body -->
    <div class="card-body">

      <!-- Description -->
      <div class="form-group">
        <label class="form-label">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h8"/>
          </svg>
          Description
        </label>
        <textarea
          [(ngModel)]="reclamation.description"
          class="form-control"
          rows="5"
          placeholder="Enter complaint description...">
        </textarea>
      </div>

      <!-- Status -->
      <div class="form-group">
        <label class="form-label">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Status
        </label>
        <select [(ngModel)]="reclamation.statut" class="form-control status-select">
          <option value="EN_ATTENTE">⏳ Pending</option>
          <option value="EN_COURS">🔵 In Progress</option>
          <option value="RESOLUE">✅ Resolved</option>
          <option value="REJETEE">❌ Rejected</option>
        </select>
      </div>

    </div>

    <!-- Card Footer -->
    <div class="card-footer">
      <a class="btn-cancel" [routerLink]="['/admin/reclamations']">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Cancel
      </a>
      <button class="btn-update" (click)="updateReclamation()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
        Save Changes
      </button>
    </div>

  </div>

</div>
