<section class="overview-banner card-box">
  <div class="overview-copy">
    <span class="eyebrow">Admin Workspace</span>
    <h2>Simple access to every admin module</h2>
    <p>Use this page to open tools, manage content, and move quickly across the admin area.</p>
  </div>
</section>

<section class="modules-section card-box">
  <div class="section-header">
    <h2>Quick Access</h2>
    <span>Open the modules you use most</span>
  </div>

  <div class="modules-grid">
    <a
      class="module-card"
      *ngFor="let module of modules"
      [routerLink]="module.link"
      [queryParams]="module.queryParams || null">
      <div class="module-icon">
        <app-admin-icon [name]="module.icon" [size]="24"></app-admin-icon>
      </div>
      <div class="module-content">
        <h3>{{ module.title }}</h3>
        <p>{{ module.subtitle }}</p>
      </div>
    </a>
  </div>
</section>
