<div class="camping-navbar">
  <div class="camping-navbar__left">
    <span class="camping-navbar__eyebrow">CampConnect</span>
    <h2>Camping Sites Management</h2>
    <p>Manage sites, availability, pricing and updates.</p>
  </div>

  <div class="camping-navbar__actions">
    <a
      routerLink="/admin/camping-sites"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="camping-nav-link"
    >
      All Sites
    </a>

    <a
    *ngIf="isGuide()"
      routerLink="/admin/camping-sites/new"
      routerLinkActive="active"
      class="camping-nav-link"
    >
      Add New Site
    </a>
  </div>
</div>
