<section class="admin-form-page">

  <div class="container">

    <h2>Edit Camping Site</h2>

    <div *ngIf="isLoading">
      Loading camping site...
    </div>

    <div *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form
      *ngIf="!isLoading && site"
      class="site-form"
      (ngSubmit)="onSubmit()"
    >

      <div class="form-group">
        <label>Name</label>
        <input
          type="text"
          name="nom"
          [(ngModel)]="site.nom"
          required
        />
      </div>

      <div class="form-group">
        <label>Location</label>
        <input
          type="text"
          name="localisation"
          [(ngModel)]="site.localisation"
          required
        />
      </div>

      <div class="form-group">
        <label>Capacity</label>
        <input
          type="number"
          name="capacite"
          [(ngModel)]="site.capacite"
          min="1"
          required
        />
      </div>

      <div class="form-group">
        <label>Price Per Night</label>
        <input
          type="number"
          name="prixParNuit"
          [(ngModel)]="site.prixParNuit"
          min="0"
          required
        />
      </div>

      <div class="form-group">
        <label>Status</label>
        <select
          name="statutDispo"
          [(ngModel)]="site.statutDispo"
        >
          <option value="AVAILABLE">AVAILABLE</option>
          <option value="FULL">FULL</option>
          <option value="CLOSED">CLOSED</option>
        </select>
      </div>

      <button type="submit" class="btn-primary">
        Update Site
      </button>

    </form>

  </div>

</section>
